version: "3.9"

services:
  devopsdb:
    image: hansika001/automation:db
    ports:
      - "3306:3306"
    networks:
      - mynetwork

  application:
    image: hansika001/automation:app
    ports:
      - "1111:8080"
    deploy:
      replicas: 3 
    depends_on:
      - devopsdb
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay
